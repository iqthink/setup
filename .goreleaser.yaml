version: 2
project_name: iqdev

before:
  hooks:
    - go mod tidy

builds:
  - id: iqdev
    main: ./cmd/iqdev
    binary: iqdev
    goos: [darwin]
    goarch: [arm64, amd64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [binary]
    name_template: 'iqdev-{{ .Os }}-{{ .Arch }}'

checksum:
  name_template: 'SHA256SUMS-{{ .Os }}-{{ .Arch }}.txt'
  split: true

release:
  github:
    owner: iqthink
    name: setup
  draft: false
  prerelease: auto
